line-length = 80

[lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = ["SIM117"]

[lint.per-file-ignores]
"scripts/python/*.py" = ["E", "SIM", "UP", "B"]
"scripts/macos/*.py" = ["E", "SIM", "UP", "B"]
